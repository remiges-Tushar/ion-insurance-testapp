name: Terraform Plan

# Runs on every PR that touches terraform/, so reviewers see the infra diff
# before approving — never applies anything, read-only.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write      # required to request the OIDC token WIF exchanges
  contents: read
  pull-requests: write # required to post/update the PR comment

env:
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/393691661756/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: tf-plan@remiges-ion.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3

      - name: terraform init
        run: terraform init

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false -detailed-exitcode
        continue-on-error: true
        # exit code 0 = no changes, 1 = real error, 2 = valid diff present.
        # continue-on-error lets us handle 2 ourselves instead of failing the job.

      - name: fail on real error
        if: steps.plan.outputs.exitcode == 1
        run: exit 1

      - name: post or update PR comment with the plan
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tf-plan -->';
            const outcome = '${{ steps.plan.outcome }}';
            const rawOutput = `${{ steps.plan.outputs.stdout }}`.slice(0, 60000);
            const body = `${marker}\n### Terraform Plan (\`${outcome}\`)\n<details><summary>Show plan</summary>\n\n\`\`\`\n${rawOutput}\n\`\`\`\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
