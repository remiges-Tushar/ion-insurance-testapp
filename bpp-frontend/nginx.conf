server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve upstream hostname on every request instead of caching at startup.
    # NGINX_RESOLVER is "127.0.0.11 8.8.8.8 8.8.4.4" for local Docker Compose
    # (127.0.0.11 resolves Compose service names) and just "8.8.8.8 8.8.4.4" on
    # Cloud Run — 127.0.0.11 has nothing listening on it there, and nginx would
    # burn its full resolver_timeout waiting on it before trying the next one.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

    location /api/ {
        set $upstream "${BPP_URL}";
        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
