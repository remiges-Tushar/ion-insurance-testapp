server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Docker service names on every request instead of caching at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://bpp:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
