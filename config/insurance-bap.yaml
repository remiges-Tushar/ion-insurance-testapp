appName: "insurance-bap"
log:
  level: debug
  destinations:
    - type: file
      config:
        path: /dev/stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins

plugins:
  otelsetup:
    id: otelsetup
    config:
      serviceName: "insurance-bap"
      serviceVersion: "1.0.0"
      environment: "development"
      domain: "ion:finance"
      enableMetrics: "false"
      enableTracing: "false"
      enableLogs: "true"
      timeInterval: "5"
      auditFieldsConfig: "/app/config/audit-fields.yaml"

modules:
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://api.dedi.global/dedi
            registryName: ion-launch-subs
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: ion.id
            keyId: insurance-bap.iontest
            signingPrivateKey: ngIGAx7cbZjC9n7+ILCxBuJe8kjx7wHtWAfS+4R5gp8=
            signingPublicKey: CnqxJ+Pst4QY92CFEIClhd6cmVXGxMnnVYwL/FvkWFQ=
            encrPrivateKey: ngIGAx7cbZjC9n7+ILCxBuJe8kjx7wHtWAfS+4R5gp8=
            encrPublicKey: CnqxJ+Pst4QY92CFEIClhd6cmVXGxMnnVYwL/FvkWFQ=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/indonesiaopennetwork/ion-specs/refs/heads/feat/beckn-v2-merge/schema/dist/ion-full.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: /app/config/routing-bap-receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        # - validateSign
        - addRoute
        - validateSchema

  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      subscriberId: ion.id
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://api.dedi.global/dedi
            registryName: ion-launch-subs
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: ion.id
            keyId: insurance-bap.iontest
            signingPrivateKey: ngIGAx7cbZjC9n7+ILCxBuJe8kjx7wHtWAfS+4R5gp8=
            signingPublicKey: CnqxJ+Pst4QY92CFEIClhd6cmVXGxMnnVYwL/FvkWFQ=
            encrPrivateKey: ngIGAx7cbZjC9n7+ILCxBuJe8kjx7wHtWAfS+4R5gp8=
            encrPublicKey: CnqxJ+Pst4QY92CFEIClhd6cmVXGxMnnVYwL/FvkWFQ=
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/indonesiaopennetwork/ion-specs/refs/heads/feat/beckn-v2-merge/schema/dist/ion-full.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: /app/config/routing-bap-caller.yaml
        signer:
          id: signer
      steps:
        - addRoute
        - sign
        - validateSchema
