server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Docker service names on every request instead of caching at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://bap:8083;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook/ {
        set $bpp http://bpp:8080;
        proxy_pass $bpp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ION service webhook — DOKU fires here (DOKU_CALLBACK_URL = .../ion-webhook/doku)
    location /ion-webhook/ {
        set $ion http://ion:8090;
        rewrite ^/ion-webhook/(.*)$ /webhook/$1 break;
        proxy_pass $ion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ION service API — frontend calls (e.g. /ion/payment/simulate)
    location /ion/ {
        set $ion http://ion:8090;
        rewrite ^/ion/(.*)$ /$1 break;
        proxy_pass $ion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
