server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve upstream hostnames on every request instead of caching at startup.
    # NGINX_RESOLVER is "127.0.0.11 8.8.8.8 8.8.4.4" for local Docker Compose
    # (127.0.0.11 resolves Compose service names) and just "8.8.8.8 8.8.4.4" on
    # Cloud Run — 127.0.0.11 has nothing listening on it there, and nginx would
    # burn its full resolver_timeout waiting on it before trying the next one.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

    # Host must match the proxy target, not the original request — Cloud Run
    # routes by Host header at its edge, so forwarding the frontend's own host
    # (e.g. via $host) makes Google's edge unable to find the backend service
    # and return its own 404 before the request ever reaches bap/bpp/ion.

    location /api/ {
        set $upstream "${BAP_URL}";
        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook/ {
        set $bpp "${BPP_URL}";
        proxy_pass $bpp;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ION service webhook — DOKU fires here (DOKU_CALLBACK_URL = .../ion-webhook/doku)
    location /ion-webhook/ {
        set $ion "${ION_URL}";
        rewrite ^/ion-webhook/(.*)$ /webhook/$1 break;
        proxy_pass $ion;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ION service API — frontend calls (e.g. /ion/payment/simulate)
    location /ion/ {
        set $ion "${ION_URL}";
        rewrite ^/ion/(.*)$ /$1 break;
        proxy_pass $ion;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
